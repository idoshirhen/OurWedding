<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>חידון החתונה של עידו ועדן</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;800&display=swap');
        
        :root {
            --primary: #d8b4fe; /* סגול בהיר */
            --primary-dark: #a78bfa; /* סגול בינוני לאפקטים */
            --secondary: #f3e8ff; /* רקע עדין */
            --dark: #6b21a8; /* טקסט כהה */
            --light: #ffffff;
            --correct: #86efac; /* ירוק הצלחה */
            --wrong: #fca5a5; /* אדום טעות */
            --screen-height: 100dvh; 
            --shadow: 0 4px 15px rgba(107, 33, 168, 0.1); /* צל סגול עדין */
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--secondary);
            color: var(--dark);
            height: var(--screen-height);
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* הקונטיינר הראשי עם אנימציית כניסה */
        .container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem; /* הגדלת ריווח */
            position: relative;
            box-shadow: 0 0 30px rgba(107, 33, 168, 0.05); /* צל חיצוני עדין */
            animation: appEntry 0.6s ease-out;
        }

        @keyframes appEntry {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- עיצוב כותרת מסך הפתיחה --- */
        .welcome-header {
            flex-shrink: 0;
            text-align: center;
            padding-bottom: 1rem;
        }

        .main-title {
            font-weight: 800; /* מודגש מאוד */
            font-size: 2.2rem;
            line-height: 1.1;
            /* אפקט גרדיאנט טקסט סגול */
            background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }

        .sub-title {
            font-weight: 300;
            font-size: 1.2rem;
            color: var(--dark);
            opacity: 0.8;
        }

        /* קו מפריד מעוצב עם לב */
        .fancy-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1.5rem 0;
            opacity: 0.5;
        }

        .fancy-divider::before,
        .fancy-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            /* קו נקודות סגול */
            background-image: linear-gradient(to right, var(--primary-dark) 40%, rgba(255,255,255,0) 0%);
            background-position: bottom;
            background-size: 8px 1px;
            background-repeat: repeat-x;
            margin: 0 10px;
        }

        /* כותרת קבועה במסך החידון */
        .wedding-theme-header {
            flex-shrink: 0;
            padding-bottom: 1rem;
            text-align: center;
        }
        
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--dark);
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem 0;
        }
        
        .question {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 2rem;
            text-align: center;
            line-height: 1.3;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem; /* הגדלת ריווח */
        }
        
        .option {
            background-color: var(--light);
            border: 2px solid var(--secondary); /* גבול ניטרלי יותר בהתחלה */
            padding: 1rem 1.2rem;
            border-radius: 15px; /* עיגול רך יותר */
            cursor: pointer;
            font-size: 1.1rem;
            text-align: right;
            transition: all 0.2s ease; /* מעבר חלק לכל השינויים */
            box-shadow: 0 2px 5px rgba(107, 33, 168, 0.03); /* צל כפתור עדין */
        }
        
        /* אפקט לחיצה/מעבר עכבר */
        .option:active {
            transform: scale(0.98);
            background-color: var(--secondary);
        }

        .option.correct { 
            background-color: var(--correct); 
            border-color: #059669; 
            color: #065f46;
            font-weight: 700;
        }
        .option.wrong { 
            background-color: var(--wrong); 
            border-color: #dc2626; 
            color: #991b1b;
        }
        
        .action-area {
            flex-shrink: 0;
            padding-top: 1rem;
            min-height: 90px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--dark);
            border: none;
            padding: 1.1rem 2rem;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.3); /* צל כפתור סגול */
            transition: all 0.3s ease;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 5px rgba(167, 139, 250, 0.2);
        }

        .btn.invisible {
            opacity: 0;
            pointer-events: none;
            transform: translateY(10px); /* מתחיל מעט נמוך */
        }

        /* כאשר הכפתור הופך לנראה */
        :not(.invisible).btn {
            animation: btnAppear 0.4s ease forwards;
        }

        @keyframes btnAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-container {
            width: 100%;
            height: 8px; /* מעט עבה יותר */
            background-color: var(--secondary);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden; /* מבטיח שהבר לא יחרוג מהעיגול */
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary-dark), var(--dark));
            width: 0%;
            transition: width 0.4s ease-out;
            border-radius: 10px;
        }

        .hidden { display: none !important; }

        /* התאמות למסכים נמוכים (כמו אייפון SE) */
        @media (max-height: 660px) {
            .container { padding: 1.2rem 1rem; }
            .main-title { font-size: 1.8rem; }
            .question { font-size: 1.2rem; margin-bottom: 1rem; }
            .option { padding: 0.8rem; font-size: 1rem; }
            .fancy-divider { margin: 0.8rem 0; }
            .btn { padding: 0.9rem; font-size: 1.1rem; }
            .action-area { min-height: 70px; }
        }
    </style>
</head>
<body>
    
    <div class="container" id="welcome-section">
        <div class="welcome-header">
            <div class="main-title">חידון החתונה</div>
            <div class="sub-title">של עידו ועדן</div>
        </div>
        
        <div class="fancy-divider">💜</div>
        
        <div class="content-area" style="text-align: center;">
            <div style="font-size: 4rem; margin-bottom: 1rem; filter: drop-shadow(0 4px 5px rgba(0,0,0,0.1));">
                👰<span style="font-size: 3rem; vertical-align: middle; margin: 0 10px;">❤️</span>🤵
            </div>
            <p style="font-size: 1.3rem; font-weight: 700; color: var(--dark);">כמה טוב אתם מכירים את הזוג? 🥰</p>
            <p style="font-size: 1.1rem; margin-top: 0.6rem; color: var(--dark); opacity: 0.9;">ענו על השאלות הבאות וגלו! 🔍</p>
            
            <div style="display: flex; justify-content: center; gap: 20px; margin-top: 30px; font-size: 2rem; opacity: 0.8;">
                <span>🥂</span><span>💍</span><span>💖</span><span>🎊</span>
            </div>
        </div>
        
        <div class="action-area">
            <button class="btn" id="start-btn">התחל את החידון ◀️</button>
        </div>
    </div>
    
    <div class="container hidden" id="quiz-section">
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="wedding-theme-header">
            <h1>השאלון</h1>
        </div>
        <div class="content-area" id="question-container">
            </div>
        <div class="action-area">
            <button class="btn invisible" id="next-btn">השאלה הבאה ◀️</button>
            <button class="btn hidden" id="submit-btn">סיים חידון 🏁</button>
        </div>
    </div>
    
    <div class="container hidden" id="results-section">
        <div class="wedding-theme-header">
            <h1>התוצאות שלך!</h1>
        </div>
        
        <div class="fancy-divider">📊</div>
        
        <div class="content-area" style="text-align: center;">
            <div id="perfect-score-celebration" class="hidden" style="font-size: 4.5rem; margin-bottom: 10px; filter: drop-shadow(0 4px 10px rgba(255, 215, 0, 0.5));">🏆</div>
            <div style="font-size: 1.4rem; color: var(--dark); opacity: 0.8;">הניקוד שלך:</div>
            <div id="final-score" style="font-size: 5rem; font-weight: 800; background: linear-gradient(135deg, var(--dark) 0%, var(--primary-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">0/10</div>
            <div id="result-message" style="padding: 0 1rem; font-size: 1.4rem; font-weight: 700; line-height: 1.3; color: var(--dark);"></div>
        </div>
        
        <div class="action-area">
            <button class="btn" id="restart-btn">נסה שוב 🔄</button>
        </div>
    </div>

    <script>
        // הלוגיקה נשארת זהה לחלוטין כפי שביקשת
        const questions = [
            { question: "מתי עדן ועידו הכירו?", options: ["2020", "2021", "2022"], answer: 1 },
            { question: "איפה עדן ועידו הכירו?", options: ["דרך חברים", "בעבודה", "באפליקצית היכרות"], answer: 1 },
            { question: "מה התחביב מספר 1 של עידו?", options: ["צילום", "כדורגל", "מחשב"], answer: 1 },
            { question: "מה התחביב מספר 1 של עדן?", options: ["לקרוא ספרים", "לצייר", "לנקות"], answer: 0 },
            { question: "מה היה המקום של הדייט הראשון?", options: ["בר", "פארק", "פיצה ברחוב"], answer: 0 },
            { question: "מה הדבר הראשון שעדן כתבה לעידו בווטסאפ?", options: ["עידו זאת עדן רוצה מים?", "היי זאת עדן מהעבודה", "מה קורה? אתה הצלם?"], answer: 0 },
            { question: "לאן הם טסו לראשונה יחד?", options: ["פראג", "פריז", "טורקיה"], answer: 1 },
            { question: "מה עדן אמרה כשעידו הציע לה נישואין?", options: ["מאמי? מה זה??", "מה אתה עושה??", "ברורררר !!!"], answer: 0 },
            { question: "מי מבני הזוג נרדם ראשון?", options: ["עדן", "עידו"], answer: 1 },
            { question: "מי יותר עצבני כשהוא רעב?", options: ["עדן", "עידו"], answer: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;

        const welcomeSection = document.getElementById('welcome-section');
        const quizSection = document.getElementById('quiz-section');
        const resultsSection = document.getElementById('results-section');
        const questionContainer = document.getElementById('question-container');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress');

        document.getElementById('start-btn').onclick = () => {
            welcomeSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            loadQuestion();
        };

        function loadQuestion() {
            const q = questions[currentQuestion];
            progressBar.style.width = `${(currentQuestion / questions.length) * 100}%`;
            
            questionContainer.innerHTML = `
                <div class="question">${q.question}</div>
                <div class="options">
                    ${q.options.map((opt, i) => `<div class="option" onclick="checkAnswer(${i}, this)">${opt}</div>`).join('')}
                </div>
            `;
            
            nextBtn.classList.add('invisible');
            submitBtn.classList.add('hidden');
        }

        function checkAnswer(idx, el) {
            const correct = questions[currentQuestion].answer;
            const allOptions = document.querySelectorAll('.option');
            
            allOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (idx === correct) {
                el.classList.add('correct');
                el.innerHTML += ' ✅';
                score++;
            } else {
                el.classList.add('wrong');
                el.innerHTML += ' ❌';
                allOptions[correct].classList.add('correct');
                allOptions[correct].innerHTML += ' ✅';
            }

            if (currentQuestion < questions.length - 1) {
                nextBtn.classList.remove('invisible');
            } else {
                nextBtn.classList.add('hidden'); 
                submitBtn.classList.remove('hidden');
            }
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            loadQuestion();
        };

        submitBtn.onclick = () => {
            quizSection.classList.add('hidden');
            resultsSection.classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
            const msg = document.getElementById('result-message');
            if(score === 10) {
                msg.textContent = "מושלם! אתם מכירים את הזוג מצוין! 🌟";
                document.getElementById('perfect-score-celebration').classList.remove('hidden');
            } else if(score >= 5) {
                msg.textContent = "יפה מאוד! אתם מכירים את הזוג די טוב! 👍";
            } else {
                msg.textContent = "יש לכם עוד מה ללמוד על הזוג! 📝";
            }
        };

        document.getElementById('restart-btn').onclick = () => location.reload();
    </script>
</body>
</html>
