<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>חידון החתונה של עידו ועדן</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700&display=swap');
        
        :root {
            --primary: #d8b4fe;
            --secondary: #f3e8ff;
            --dark: #6b21a8;
            --light: #ffffff;
            --correct: #86efac;
            --wrong: #fca5a5;
            --gold: #ffd700;
            --screen-height: 100dvh; 
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: 'Heebo', sans-serif;
            background-color: var(--secondary);
            color: var(--dark);
            height: var(--screen-height);
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            height: 100%;
            max-width: 500px;
            background-color: var(--light);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            position: relative;
        }

        /* כותרת קבועה */
        .wedding-theme-header {
            flex-shrink: 0;
            padding: 1rem 0;
            text-align: center;
        }
        
        h1 {
            font-size: 1.8rem;
            line-height: 1.3;
            color: var(--dark);
            margin-bottom: 0.5rem;
        }

        .content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 1rem 0;
        }
        
        .question {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
        }
        
        .option {
            background-color: var(--light);
            border: 2px solid var(--primary);
            padding: 0.9rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            text-align: right;
            transition: background-color 0.2s;
        }
        
        .option.correct { background-color: var(--correct); border-color: #059669; }
        .option.wrong { background-color: var(--wrong); border-color: #dc2626; }
        
        /* אזור הכפתור - כאן הקסם של הקיבוע */
        .action-area {
            flex-shrink: 0;
            padding: 1rem 0;
            min-height: 80px; /* שומר מקום קבוע לכפתור */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn {
            background-color: var(--primary);
            color: var(--dark);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            width: 100%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: opacity 0.3s ease;
        }

        /* מצב שבו הכפתור "תופס מקום" אבל לא נראה */
        .btn.invisible {
            opacity: 0;
            pointer-events: none;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background-color: var(--secondary);
            border-radius: 10px;
            margin-bottom: 15px;
        }
        
        .progress-bar {
            height: 100%;
            background-color: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .hidden { display: none !important; }

        @media (max-height: 650px) {
            h1 { font-size: 1.4rem; }
            .question { font-size: 1.1rem; margin-bottom: 0.8rem; }
            .option { padding: 0.7rem; font-size: 1rem; }
        }
    </style>
</head>
<body>
    
    <div class="container" id="welcome-section">
        <div class="wedding-theme-header">
            <h1>ברוכים הבאים<br>לחידון החתונה של עידו ועדן</h1>
        </div>
        <div class="content-area" style="text-align: center;">
            <div style="font-size: 3.5rem; margin-bottom: 1rem;">👰❤️🤵</div>
            <p style="font-size: 1.2rem; font-weight: bold;">כמה טוב אתם מכירים את הזוג? 🥰</p>
            <p style="font-size: 1.1rem; margin-top: 0.5rem;">ענו על השאלות הבאות וגלו! 🔍</p>
            <div style="display: flex; justify-content: center; gap: 15px; margin-top: 25px; font-size: 1.8rem;">
                <span>🥂</span><span>💍</span><span>💖</span><span>🎊</span>
            </div>
        </div>
        <div class="action-area">
            <button class="btn" id="start-btn">◀️ התחל את החידון</button>
        </div>
    </div>
    
    <div class="container hidden" id="quiz-section">
        <div class="progress-container">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="content-area" id="question-container">
            </div>
        <div class="action-area">
            <button class="btn invisible" id="next-btn">◀️ השאלה הבאה</button>
            <button class="btn hidden" id="submit-btn">סיים חידון 🏁</button>
        </div>
    </div>
    
    <div class="container hidden" id="results-section">
        <div class="wedding-theme-header">
            <h1>התוצאות שלך!</h1>
        </div>
        <div class="content-area" style="text-align: center;">
            <div id="perfect-score-celebration" class="hidden" style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
            <div style="font-size: 1.3rem;">הניקוד שלך:</div>
            <div id="final-score" style="font-size: 4rem; font-weight: bold; color: var(--dark);">0/10</div>
            <div id="result-message" style="padding: 0 1.5rem; font-size: 1.3rem;"></div>
        </div>
        <div class="action-area">
            <button class="btn" id="restart-btn">נסה שוב 🔄</button>
        </div>
    </div>

    <script>
        const questions = [
            { question: "מתי עדן ועידו הכירו?", options: ["2020", "2021", "2022"], answer: 1 },
            { question: "איפה עדן ועידו הכירו?", options: ["דרך חברים", "בעבודה", "באפליקצית היכרות"], answer: 1 },
            { question: "מה התחביב מספר 1 של עידו?", options: ["צילום", "כדורגל", "מחשב"], answer: 1 },
            { question: "מה התחביב מספר 1 של עדן?", options: ["לקרוא ספרים", "לצייר", "לנקות"], answer: 0 },
            { question: "מה היה המקום של הדייט הראשון?", options: ["בר", "פארק", "פיצה ברחוב"], answer: 0 },
            { question: "מה הדבר הראשון שעדן כתבה לעידו בווטסאפ?", options: ["עידו זאת עדן רוצה מים?", "היי זאת עדן מהעבודה", "מה קורה? אתה הצלם?"], answer: 0 },
            { question: "לאן הם טסו לראשונה יחד?", options: ["פראג", "פריז", "טורקיה"], answer: 1 },
            { question: "מה עדן אמרה כשעידו הציע לה נישואין?", options: ["מאמי? מה זה??", "מה אתה עושה??", "ברורררר !!!"], answer: 0 },
            { question: "מי מבני הזוג נרדם ראשון?", options: ["עדן", "עידו"], answer: 1 },
            { question: "מי יותר עצבני כשהוא רעב?", options: ["עדן", "עידו"], answer: 1 }
        ];

        let currentQuestion = 0;
        let score = 0;

        const welcomeSection = document.getElementById('welcome-section');
        const quizSection = document.getElementById('quiz-section');
        const resultsSection = document.getElementById('results-section');
        const questionContainer = document.getElementById('question-container');
        const nextBtn = document.getElementById('next-btn');
        const submitBtn = document.getElementById('submit-btn');
        const progressBar = document.getElementById('progress');

        document.getElementById('start-btn').onclick = () => {
            welcomeSection.classList.add('hidden');
            quizSection.classList.remove('hidden');
            loadQuestion();
        };

        function loadQuestion() {
            const q = questions[currentQuestion];
            progressBar.style.width = `${(currentQuestion / questions.length) * 100}%`;
            
            questionContainer.innerHTML = `
                <div class="question">${q.question}</div>
                <div class="options">
                    ${q.options.map((opt, i) => `<div class="option" onclick="checkAnswer(${i}, this)">${opt}</div>`).join('')}
                </div>
            `;
            
            // איפוס כפתורים - מחזירים למצב בלתי נראה במקום להעלים מה-DOM
            nextBtn.classList.add('invisible');
            submitBtn.classList.add('hidden');
        }

        function checkAnswer(idx, el) {
            const correct = questions[currentQuestion].answer;
            const allOptions = document.querySelectorAll('.option');
            
            allOptions.forEach(opt => opt.style.pointerEvents = 'none');
            
            if (idx === correct) {
                el.classList.add('correct');
                el.innerHTML += ' ✅';
                score++;
            } else {
                el.classList.add('wrong');
                el.innerHTML += ' ❌';
                allOptions[correct].classList.add('correct');
                allOptions[correct].innerHTML += ' ✅';
            }

            // הופעת הכפתור המתאים ללא הזזת הדף
            if (currentQuestion < questions.length - 1) {
                nextBtn.classList.remove('invisible');
            } else {
                nextBtn.classList.add('hidden'); // השאלה האחרונה, אז מחליפים לסיום
                submitBtn.classList.remove('hidden');
            }
        }

        nextBtn.onclick = () => {
            currentQuestion++;
            loadQuestion();
        };

        submitBtn.onclick = () => {
            quizSection.classList.add('hidden');
            resultsSection.classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score}/${questions.length}`;
            const msg = document.getElementById('result-message');
            if(score === 10) {
                msg.textContent = "מושלם! אתם מכירים את הזוג מצוין! 🌟";
                document.getElementById('perfect-score-celebration').classList.remove('hidden');
            } else if(score >= 5) {
                msg.textContent = "יפה מאוד! אתם מכירים את הזוג די טוב! 👍";
            } else {
                msg.textContent = "יש לכם עוד מה ללמוד על הזוג! 📝";
            }
        };

        document.getElementById('restart-btn').onclick = () => location.reload();
    </script>
</body>
</html>
